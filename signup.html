<!DOCTYPE html>
<html> 

<head>
    <meta charset="UTF-8">
    <meta name="viewsport" content="width=device width" initial-scale="1.O"> 
    <title>BrainMosh</title>
    <link rel="icon" href="">
    <link href="signup.css" rel="stylesheet" type="text/css" media="all"> 
</head>

<body>
    <div id="lighting">
        <img src="backgrounds/bglight.png"> > 
    </div>
    <div id="container">
        <div class="signIn">
            <img src="UI/signin.png" width="700px"> 
            
            <form id="inputFields" action="#infostoragehere" method="post">
                <div>
                    <label for="username"></label>
                    <input type="text" id="username" name="username" placeholder="Username" maxlength="16" required>
                </div>
                <br>
                <div>
                    <label for="email"></label>
                    <input type="email" id="email" name="email" placeholder="Email" requird> 
                </div>
                <br>
                <div>
                    <label for="pass"></label>
                    <input type="password" id="pass" name="pass" placeholder="Password" maxlength="16" required> 
                </div>

                <div class="submitInputFields">
                    <button type="submit" id="logInButton">
                        <a href="mainpage.html"><img src="buttons/arrow.png" width="70px"></a>
                        </button>
                    </div>
            </form>
        </div>
        <div id="logInLink">
            <a href="index.html">Already have an account? Log In</a>
        </div>
    </div>
    <div id="bgmusic">
        <audio autoplay loop muted>
            <source src="audio/Yeat - U Could Tell (INSTRUMENTAL).mp3">
        </audio>
    </div>
</body>

<script>

</script>

</html>
