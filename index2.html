                <div>
                    <label for="pass"></label>
                    <input type="password" id="pass" name="pass" placeholder="Password" maxlength="16" required>

                <div class="submitInputFields">
                    <button type="submit" id="logInButton">
                        <img src="buttons/arrow.png" width="70px" alt="Log In">
                        </button>
                    </div>
            </form>
        </div>
        <div id="signUpLink">
            <a href="signup.html">Don't have an account? Sign Up</a>
        </div>
    </div>
    <div id="bgmusic">
